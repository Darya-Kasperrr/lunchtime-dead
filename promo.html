<!DOCTYPE html>
<html lang="ja" data-theme="dead">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PROMO — Lunchtime Dead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Shippori+Mincho+B1:wght@700;800&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  html,body{height:100%;overflow:hidden;background:#050409}
  #stage{position:fixed;inset:0}
  #stage canvas{width:100%;height:100%;display:block;cursor:grab}
  #stage canvas:active{cursor:grabbing}

  /* film chrome */
  .promo-osd-top{
    position:fixed;top:18px;left:20px;right:20px;z-index:5;
    display:flex;justify-content:space-between;pointer-events:none;
  }
  .promo-osd-top .osd{color:rgba(242,239,230,.75);font-size:12px}
  .promo-osd-top .rec{color:#ff4747}

  /* cinema captions */
  .caption{
    position:fixed;left:0;right:0;bottom:10vh;z-index:5;text-align:center;
    pointer-events:none;padding:0 16px;
  }
  .caption .jp{
    font-family:var(--font-display);font-weight:800;
    font-size:clamp(20px,4.4vw,44px);color:#f2efe6;
    text-shadow:0 0 22px rgba(255,92,138,.55),0 2px 18px rgba(0,0,0,.8);
    opacity:0;transform:translateY(14px);
    transition:opacity .7s,transform .7s;
  }
  .caption .en{
    margin-top:8px;font-family:var(--font-osd);
    font-size:clamp(11px,1.5vw,14px);letter-spacing:.3em;text-transform:uppercase;
    color:rgba(242,239,230,.65);
    opacity:0;transition:opacity .7s .15s;
  }
  .caption.show .jp{opacity:1;transform:none}
  .caption.show .en{opacity:1}

  .promo-hint{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:5;
    font-family:var(--font-osd);font-size:10px;letter-spacing:.22em;
    color:rgba(242,239,230,.4);pointer-events:none;white-space:nowrap;
  }
  .promo-back{
    position:fixed;right:18px;bottom:18px;z-index:6;
    font-family:var(--font-osd);font-size:11px;letter-spacing:.16em;
    color:rgba(242,239,230,.7);border:1px solid rgba(242,239,230,.25);
    border-radius:4px;padding:9px 14px;transition:.25s;
  }
  .promo-back:hover{color:#fff;border-color:var(--neon)}

  /* start gate */
  #gate{
    position:fixed;inset:0;z-index:20;background:#050409;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
    transition:opacity .6s;
  }
  #gate.gone{opacity:0;pointer-events:none}
  #gate img{width:min(46vw,300px);filter:drop-shadow(0 0 30px rgba(255,92,138,.75))}
  #gate button{
    font-family:var(--font-osd);font-size:14px;letter-spacing:.3em;text-transform:uppercase;
    color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:4px;
    padding:14px 34px;cursor:pointer;transition:.3s;
    animation:enter-pulse 2.6s ease-in-out infinite;
  }
  #gate button:hover{background:rgba(255,92,138,.2);border-color:var(--neon)}
  #gate .osd{color:rgba(242,239,230,.5);font-size:11px}
  .letterbox--p{position:fixed;left:0;right:0;height:clamp(24px,4.5vh,52px);background:#000;z-index:4}
</style>
</head>
<body>

<div id="stage"><canvas id="c"></canvas></div>

<div class="letterbox--p" style="top:0"></div>
<div class="letterbox--p" style="bottom:0"></div>
<div class="grain" aria-hidden="true"></div>
<div class="scanlines" aria-hidden="true"></div>

<div class="promo-osd-top">
  <span class="osd"><span class="rec">● REC</span>&nbsp; PROMO REEL ・ SP</span>
  <span class="osd" id="tc">00:00:00:00</span>
</div>

<div class="caption" id="cap">
  <div class="jp" id="capJp"></div>
  <div class="en" id="capEn"></div>
</div>

<span class="promo-hint">DRAG TO SPIN ・ ドラッグで回転</span>
<a class="promo-back" href="index.html">OPEN SITE ▶</a>

<div id="gate">
  <img src="assets/logo-white.png" alt="Lunchtime Dead">
  <button id="gateBtn">▶ START PROMO</button>
  <span class="osd">SOUND ON ・ 音が出ます</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="vendor/SVGLoader.js"></script>
<script src="assets/logo-svg.js"></script>
<script src="promo.js"></script>
</body>
</html>
